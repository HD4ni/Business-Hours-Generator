<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>IG Story Schedule Generator</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:ital,wght@0,600;1,400&family=Poppins:wght@300;400&family=Noto+Serif+TC:wght@500&family=Dancing+Script:wght@600&family=Zeyada&family=Zhi+Mang+Xing&family=Noto+Sans+TC:wght@400;700&display=swap">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --purple-main: #9B59B6;
            --purple-light: #AF7AC5;
            --sidebar-bg: #212121;
            --card-bg: #2d2d2d;
            --input-bg: #3d3d3d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #1a1a1a; display: flex; justify-content: center; padding: 20px; color: #eee; gap: 20px; min-height: 100vh; font-family: 'Montserrat', 'Noto Sans TC', sans-serif; }

        /* 核心動畫屬性修復 */
        .btn-anim { 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
        }
        .btn-anim:hover { 
            transform: translateY(-2px); 
            filter: brightness(1.2); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn-anim:active { 
            transform: translateY(0) scale(0.96); 
        }

        /* 側邊面板 */
        .panel { width: 310px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
        .settings-block { background: var(--card-bg); padding: 18px; border-radius: 12px; font-size: 13px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .settings-block h4 { margin-bottom: 12px; border-left: 4px solid var(--purple-main); padding-left: 10px; font-weight: 600; color: #fff; }
        .control-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .label-group { display: flex; justify-content: space-between; align-items: center; color: #aaa; font-size: 11px; }
        
        select, input[type="text"], textarea { padding: 9px; border-radius: 6px; border: 1px solid #444; background: var(--input-bg); color: #fff; width: 100%; outline: none; transition: border 0.3s; }
        select:focus, input[type="text"]:focus { border-color: var(--purple-main); }

        /* 預覽區域 */
        .preview-container { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #storyPreview {
            width: 450px; height: 800px; background-color: #222; position: relative; 
            display: flex; justify-content: center; align-items: flex-start; 
            overflow: hidden; border: 1px solid #444; border-radius: 4px; box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        #bgLayer {
            position: absolute; top: 50%; left: 50%; transform-origin: center center; z-index: 1;
        }

        .main-container { position: relative; z-index: 2; width: 85%; margin-top: 30px; display: flex; flex-direction: column; align-items: center; height: 100%; pointer-events: none; }
        .main-container * { pointer-events: auto; } /* 確保內部元素可點擊 */

        .year-label { font-size: 14px; letter-spacing: 4px; margin-bottom: -5px; }
        .month-num { font-size: 110px; line-height: 0.8; margin-bottom: 5px; }
        .month-eng { font-size: 32px; margin-bottom: 25px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; width: 100%; }
        
        /* 星期標題懸浮動畫 */
        .weekday { 
            text-align: center; font-size: 10px; font-weight: 600; padding-bottom: 5px; 
            transition: all 0.3s ease; border-radius: 4px; cursor: pointer;
        }
        .weekday:hover { transform: scale(1.15); filter: brightness(1.5); text-shadow: 0 0 10px currentColor; }

        /* 日期格懸浮動畫 */
        .day-cell {
            position: relative;
            overflow: hidden;
            height: 80px; display: flex; flex-direction: column; align-items: flex-start; padding: 5px; 
            border-radius: 3px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background-clip: padding-box;
        }
        .day-cell .glass-overlay {
            position: absolute;
            inset: 0;
            background-repeat: no-repeat;
            filter: blur(10px);
            transform: scale(1.05);
            opacity: 1;
            z-index: 0;
            pointer-events: none;
        }
        .day-cell .cell-content { position: relative; z-index: 1; }
        .day-cell:hover { transform: translateY(-3px) scale(1.02); background: rgba(255,255,255,0.9) !important; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .day-cell.active-focus { border: 2.5px solid var(--purple-main); background: #fff !important; transform: scale(1.06); z-index: 10; box-shadow: 0 0 25px rgba(155, 89, 182, 0.5); }
        
        .day-num-tag { font-size: 12px; font-weight: 600; color: #333; margin-bottom: 3px; }
        .time-label { font-size: 11px; line-height: 1.1; width: 100%; text-align: center; font-weight: 600; }
        .closed-label { color: #D32F2F; font-weight: 800; font-size: 10px; width: 100%; text-align: center; margin-top: 5px; }

        .footer-info { 
            margin-top: 25px; text-align: center; font-size: 13px; line-height: 1.5; 
            width: 95%; border-radius: 8px; color: #333; display: none;
        }
        .footer-info.has-content { 
            display: block; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); 
            padding: 12px; border: 1px solid rgba(255,255,255,0.4);
        }

        /* 編輯按鈕動畫 */
        .time-chip { 
            padding: 9px 4px; background: #333; border-radius: 6px; font-size: 11px; text-align: center; 
            cursor: pointer; border: 1px solid #444; transition: all 0.2s ease; 
        }
        .time-chip:hover { border-color: var(--purple-main); background: #444; }
        .time-chip.selected { background: var(--purple-main); border-color: var(--purple-main); color: #fff; transform: scale(0.95); }

        .download-btn { background: var(--purple-main); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 600; width: 100%; cursor: pointer; font-size: 15px; }
        .batch-action-btn { background: #444; color: #fff; border: 1px solid #555; padding: 10px; border-radius: 6px; font-size: 12px; cursor: pointer; width: 100%; margin-top: 10px; }
        .batch-action-btn:hover { background: #E57373; border-color: #E57373; }

        input[type="color"] { width: 100%; height: 35px; border: none; cursor: pointer; background: transparent; }
        input[type="range"] { accent-color: var(--purple-main); cursor: pointer; }

        /* 效果選擇按鈕 */
        .effect-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .effect-btn { 
            flex: 1; padding: 10px; border-radius: 6px; border: 2px solid #555; background: #3d3d3d; 
            color: #aaa; cursor: pointer; font-size: 12px; font-weight: 600; 
            transition: all 0.3s ease; text-align: center;
        }
        .effect-btn:hover { border-color: var(--purple-main); color: #fff; }
        .effect-btn.active { border-color: var(--purple-main); background: var(--purple-main); color: #fff; }

        /* 毛玻璃效果模式 */
        .day-cell.frosted-glass {
            background: rgba(255, 255, 255, 0.22) !important;
            backdrop-filter: blur(10px) !important;
            border: 1px solid rgba(255, 255, 255, 0.28);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        .day-cell.transparent-mode {
            backdrop-filter: none !important;
        }

        /* 美化檔案選擇按鈕 */
        .file-input-wrapper {
            position: relative;
            display: block;
            width: 100%;
        }
        .file-input-label {
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            background: var(--card-bg);
            border: 2px dashed #555;
            border-radius: 8px;
            color: #aaa;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }
        .file-input-label:hover {
            border-color: var(--purple-main);
            background: rgba(155, 89, 182, 0.1);
            color: var(--purple-main);
        }
        .file-input-label:active {
            transform: scale(0.98);
        }
        .file-input-wrapper:hover .file-input-label {
            transform: translateY(-2px);
            filter: brightness(1.2);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .file-input-wrapper:active .file-input-label {
            transform: translateY(0) scale(0.96);
        }
        .file-input-label i {
            margin-right: 8px;
            font-size: 16px;
        }
        #fileInput {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="panel">
        <div class="settings-block">
            <h4>🖼️ 上傳背景圖片</h4>
            <div class="control-row">
                <div class="file-input-wrapper">
                    <label for="fileInput" class="file-input-label btn-anim">
                        <i>📁</i> 選擇背景圖片
                    </label>
                    <input type="file" id="fileInput" accept="image/*">
                </div>
            </div>
            <div class="control-row"><div class="label-group"><label>縮放</label><span id="scaleVal">1.0</span></div><input type="range" id="bgScale" min="0.1" max="4" step="0.01" value="1"></div>
            <div class="control-row"><div class="label-group"><label>水平位移</label><span id="xVal">0</span></div><input type="range" id="bgX" min="-1000" max="1000" step="1" value="0"></div>
            <div class="control-row"><div class="label-group"><label>垂直位移</label><span id="yVal">0</span></div><input type="range" id="bgY" min="-1000" max="1000" step="1" value="0"></div>
        </div>

        <div class="settings-block">
            <h4>🎨 色彩計畫</h4>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div class="control-row"><label>標題顏色</label><input type="color" id="titleColor" value="#333333" class="btn-anim"></div>
                <div class="control-row"><label>時段文字</label><input type="color" id="timeColor" value="#9B59B6" class="btn-anim"></div>
                <div class="control-row"><label>格底色</label><input type="color" id="cellBgColor" value="#ffffff" class="btn-anim"></div>
                <div class="control-row"><label>說明顏色</label><input type="color" id="descColor" value="#333333" class="btn-anim"></div>
            </div>
            <div class="control-row"><div class="label-group"><label>格透明度</label><span id="opVal">0.7</span></div><input type="range" id="cellOpacity" min="0" max="1" step="0.05" value="0.7"></div>
            <div class="control-row"><label style="margin-bottom: 8px;">日期格效果：</label><div class="effect-buttons"><button class="effect-btn active" id="effectTransparent" onclick="changeEffect('transparent')">半透明</button><button class="effect-btn" id="effectFrosted" onclick="changeEffect('frosted')">毛玻璃 (請手動截圖)</button></div></div>
        </div>

        <div class="settings-block">
            <h4>🔤 字體設定系統</h4>
            <div class="control-row"><label>年份：</label><select id="fontYear" onchange="updateFonts()"><option value="'Montserrat'">Montserrat</option><option value="'Poppins'">Poppins</option><option value="'Playfair Display'">Playfair Display</option></select></div>
            <div class="control-row"><label>月份：</label><select id="fontMonth" onchange="updateFonts()"><option value="'Playfair Display'">Playfair Display</option><option value="'Dancing Script'">Dancing Script</option><option value="'Zhi Mang Xing'">Zhi Mang Xing</option><option value="'Zeyada'">Zeyada</option></select></div>
            <div class="control-row"><label>日期時段：</label><select id="fontDay" onchange="updateFonts()"><option value="'Montserrat'">Montserrat</option><option value="'Poppins'">Poppins</option><option value="'Noto Serif TC'">Noto Serif TC</option><option value="'Zeyada'">Zeyada</option></select></div>
        </div>
    </div>

    <div class="preview-container">
        <div id="storyPreview">
            <img id="bgLayer" src="" alt="">
            <div class="main-container" id="titleContainer">
                <p class="year-label" id="uiYear">2026</p>
                <h1 class="month-num" id="uiMonth">04</h1>
                <p class="month-eng" id="uiMonthEng">April</p>
                <div class="calendar-grid">
                    <div class="weekday btn-anim" id="wd-0" onclick="selectBatch(0, 'SUN')">SUN</div>
                    <div class="weekday btn-anim" id="wd-1" onclick="selectBatch(1, 'MON')">MON</div>
                    <div class="weekday btn-anim" id="wd-2" onclick="selectBatch(2, 'TUE')">TUE</div>
                    <div class="weekday btn-anim" id="wd-3" onclick="selectBatch(3, 'WED')">WED</div>
                    <div class="weekday btn-anim" id="wd-4" onclick="selectBatch(4, 'THU')">THU</div>
                    <div class="weekday btn-anim" id="wd-5" onclick="selectBatch(5, 'FRI')">FRI</div>
                    <div class="weekday btn-anim" id="wd-6" onclick="selectBatch(6, 'SAT')">SAT</div>
                    <div id="calendarBody" style="display: contents;"></div>
                </div>
                <div class="footer-info" id="uiDesc"></div>
            </div>
        </div>
        <button class="download-btn btn-anim" onclick="downloadStory()">下載 PNG 成品</button>
    </div>

    <div class="panel">
        <div class="settings-block" style="flex:1;">
            <h3 id="editTitle" style="color:var(--purple-light); margin-bottom:10px;">請點選日期</h3>
            <div id="batchColorContainer" style="display:none; margin-bottom:10px;">
                <label>星期顏色：</label><input type="color" id="weekdayColorPicker" class="btn-anim">
            </div>
            <label style="display:flex; align-items:center; margin-bottom:10px; cursor:pointer;"><input type="checkbox" id="isClosedCheck" onchange="syncData()" class="btn-anim"> <span style="margin-left:8px;">公休</span></label>
            <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:6px; max-height:450px; overflow-y:auto;" id="timeGrid"></div>
        </div>
        <div class="settings-block">
            <textarea id="descInput" rows="3" placeholder="補充說明..."></textarea>
            <button class="batch-action-btn btn-anim" onclick="toggleClosedAll()">剩餘日期填滿公休</button>
        </div>
    </div>

<script>
    // 自動校準台灣時間
    let YEAR, MONTH;
    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    function initCurrentDate() {
        const now = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Taipei"}));
        YEAR = now.getFullYear();
        MONTH = now.getMonth();
        document.getElementById('uiYear').innerText = YEAR;
        document.getElementById('uiMonth').innerText = (MONTH + 1).toString().padStart(2, '0');
        document.getElementById('uiMonthEng').innerText = monthNames[MONTH];
    }

    initCurrentDate();

    const scheduleData = {};
    const weekdayColors = { 0: "#E57373", 1: "#aaaaaa", 2: "#aaaaaa", 3: "#aaaaaa", 4: "#aaaaaa", 5: "#aaaaaa", 6: "#81D4FA" };
    let activeKey = null, isBatch = false;
    let currentEffect = 'transparent'; // 追蹤當前效果

    // 影像控制
    const bgLayer = document.getElementById('bgLayer');
    const updateBgTransform = () => {
        const s = document.getElementById('bgScale').value;
        const x = document.getElementById('bgX').value;
        const y = document.getElementById('bgY').value;
        document.getElementById('scaleVal').innerText = s;
        document.getElementById('xVal').innerText = x;
        document.getElementById('yVal').innerText = y;
        bgLayer.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) scale(${s})`;
    };
    ['bgScale', 'bgX', 'bgY'].forEach(id => document.getElementById(id).oninput = updateBgTransform);

    document.getElementById('fileInput').onchange = e => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => { bgLayer.src = ev.target.result; bgLayer.style.backgroundSize = 'auto'; };
        reader.readAsDataURL(file);
    };

    function updateFonts() {
        document.getElementById('uiYear').style.fontFamily = document.getElementById('fontYear').value;
        document.getElementById('uiMonth').style.fontFamily = document.getElementById('fontMonth').value;
        document.getElementById('uiMonthEng').style.fontFamily = document.getElementById('fontMonth').value;
        render();
    }

    document.getElementById('titleColor').oninput = e => document.getElementById('titleContainer').style.color = e.target.value;
    document.getElementById('cellBgColor').oninput = render;
    document.getElementById('cellOpacity').oninput = e => { document.getElementById('opVal').innerText = e.target.value; render(); };
    document.getElementById('timeColor').oninput = render;
    document.getElementById('descColor').oninput = e => document.getElementById('uiDesc').style.color = e.target.value;
    document.getElementById('descInput').oninput = e => {
        const ui = document.getElementById('uiDesc');
        ui.innerText = e.target.value;
        e.target.value.trim() ? ui.classList.add('has-content') : ui.classList.remove('has-content');
    };

    const timeGrid = document.getElementById('timeGrid');
    for(let h=8; h<=22; h++){
        [":00", ":30"].forEach(m => {
            let t = `${h.toString().padStart(2,'0')}${m}`;
            let b = document.createElement('div');
            b.className = 'time-chip btn-anim'; b.innerText = t; 
            b.onclick = () => {
                if(!activeKey) return;
                if(!b.classList.contains('selected') && document.querySelectorAll('.time-chip.selected').length >= 4) return;
                b.classList.toggle('selected'); syncData();
            };
            timeGrid.appendChild(b);
        });
    }

    function syncData() {
        if(!activeKey) return;
        const closed = document.getElementById('isClosedCheck').checked;
        const times = Array.from(document.querySelectorAll('.time-chip.selected')).map(el => el.innerText);
        const config = (closed || times.length > 0) ? { closed, times: closed ? [] : times } : null;
        if (isBatch) {
            const idx = parseInt(activeKey.split('-')[1]);
            weekdayColors[idx] = document.getElementById('weekdayColorPicker').value;
            const total = new Date(YEAR, MONTH + 1, 0).getDate(), first = new Date(YEAR, MONTH, 1).getDay();
            for(let d=1; d<=total; d++) if((first+d-1)%7 === idx) scheduleData[`${YEAR}-${MONTH}-${d}`] = config ? JSON.parse(JSON.stringify(config)) : null;
        } else scheduleData[activeKey] = config;
        render();
    }

    function selectDay(d, key, el) {
        isBatch = false; activeKey = key;
        document.querySelectorAll('.day-cell, .weekday').forEach(node => node.classList.remove('active-focus'));
        el.classList.add('active-focus');
        document.getElementById('editTitle').innerText = `編輯 ${d} 日`;
        document.getElementById('batchColorSection')?.remove(); // 清除舊的
        document.getElementById('batchColorContainer').style.display = 'none';
        const c = scheduleData[key] || {closed: false, times: []};
        document.getElementById('isClosedCheck').checked = c.closed;
        document.querySelectorAll('.time-chip').forEach(chip => chip.classList.toggle('selected', c.times.includes(chip.innerText)));
    }

    function changeEffect(effect) {
        currentEffect = effect;
        document.getElementById('effectTransparent').classList.toggle('active', effect === 'transparent');
        document.getElementById('effectFrosted').classList.toggle('active', effect === 'frosted');
        render();
    }

    function selectBatch(idx, name) {
        isBatch = true; activeKey = `BATCH-${idx}`;
        document.querySelectorAll('.day-cell, .weekday').forEach(node => node.classList.remove('active-focus'));
        document.getElementById(`wd-${idx}`).classList.add('active-focus');
        document.getElementById('editTitle').innerText = `批次：${name}`;
        document.getElementById('batchColorContainer').style.display = 'block';
        document.getElementById('weekdayColorPicker').value = weekdayColors[idx];
        document.getElementById('isClosedCheck').checked = false;
        document.querySelectorAll('.time-chip').forEach(chip => chip.classList.remove('selected'));
    }

    function render() {
        for (let i = 0; i < 7; i++) document.getElementById(`wd-${i}`).style.color = weekdayColors[i];
        const cellColor = document.getElementById('cellBgColor').value;
        const cellOp = document.getElementById('cellOpacity').value;
        const r = parseInt(cellColor.slice(1, 3), 16), g = parseInt(cellColor.slice(3, 5), 16), b = parseInt(cellColor.slice(5, 7), 16);
        const rgba = `rgba(${r}, ${g}, ${b}, ${cellOp})`;

        const first = new Date(YEAR, MONTH, 1).getDay(), total = new Date(YEAR, MONTH + 1, 0).getDate();
        const body = document.getElementById('calendarBody'), tColor = document.getElementById('timeColor').value;
        const fDay = document.getElementById('fontDay').value;
        body.innerHTML = '';
        for(let i=0; i<first; i++) body.innerHTML += `<div class="day-cell" style="visibility:hidden"></div>`;
        for(let d=1; d<=total; d++){
            const key = `${YEAR}-${MONTH}-${d}`, config = scheduleData[key];
            let html = `<div class="day-num-tag">${d}</div>`;
            if(config) {
                if(config.closed) html += `<div class="closed-label">CLOSE</div>`;
                else config.times.forEach(t => html += `<div class="time-label" style="color:${tColor}">${t}</div>`);
            }
            const cell = document.createElement('div');
            cell.className = `day-cell ${activeKey === key ? 'active-focus' : ''}`;
            cell.innerHTML = `<div class="glass-overlay"></div><div class="cell-content">${html}</div>`;
            cell.style.fontFamily = fDay;
            cell.onclick = () => selectDay(d, key, cell);
            body.appendChild(cell);

            const overlay = cell.querySelector('.glass-overlay');
            if (currentEffect === 'frosted' && bgLayer.src) {
                const bgRect = bgLayer.getBoundingClientRect();
                const cellRect = cell.getBoundingClientRect();
                const offsetX = cellRect.left - bgRect.left;
                const offsetY = cellRect.top - bgRect.top;
                overlay.style.display = 'block';
                overlay.style.backgroundImage = `url('${bgLayer.src}')`;
                overlay.style.backgroundSize = `${bgRect.width}px ${bgRect.height}px`;
                overlay.style.backgroundPosition = `${-offsetX}px ${-offsetY}px`;
                cell.style.background = 'rgba(255,255,255,0.22)';
            } else {
                overlay.style.display = 'none';
                cell.style.background = rgba;
            }
        }
        document.querySelectorAll('.weekday').forEach(el => el.style.fontFamily = fDay);
    }

    function toggleClosedAll() {
        const total = new Date(YEAR, MONTH + 1, 0).getDate();
        let anyEmpty = false;
        for(let d=1; d<=total; d++) if(!scheduleData[`${YEAR}-${MONTH}-${d}`]) anyEmpty = true;
        for(let d=1; d<=total; d++){
            const key = `${YEAR}-${MONTH}-${d}`;
            if(anyEmpty) { if(!scheduleData[key]) scheduleData[key] = { closed: true, times: [] }; }
            else { if(scheduleData[key]?.closed) delete scheduleData[key]; }
        }
        render();
    }

    function downloadStory() {
        const scale = Math.max(3, Math.round(window.devicePixelRatio * 2));
        html2canvas(document.getElementById('storyPreview'), {
            useCORS: true,
            scale,
            backgroundColor: '#222',
            imageTimeout: 20000,
            scrollX: 0,
            scrollY: 0,
            windowWidth: document.documentElement.scrollWidth,
            windowHeight: document.documentElement.scrollHeight,
            onclone: (clonedDoc) => {
                const clonedPreview = clonedDoc.getElementById('storyPreview');
                if (clonedPreview) clonedPreview.style.backgroundColor = '#222';
            },
        }).then(canvas => {
            const link = document.createElement('a'); link.download = `Schedule_${YEAR}_${MONTH+1}.png`;
            link.href = canvas.toDataURL('image/png', 1.0); link.click();
        });
    }

    render(); updateFonts();
</script>
</body>
</html>
